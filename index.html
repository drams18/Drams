<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arphan DRAME — Portfolio</title>
  <meta name="description" content="Portfolio interactif d'Arphan DRAME — Développeur Full Stack Paris">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="icon" href="assets/img/favicon.png">
  <link rel="stylesheet" href="style.css">
  <style>
    .desktop-only { display: none; }
    @media (min-width: 768px) {
      .desktop-only { display: block; }
    }
  </style>
</head>
<body>
  <div id="screen-welcome" class="screen active">
    <div class="welcome-sky"></div>
    <div class="welcome-content">
      <h1 class="mc-title">ARPHAN DRAME</h1>
      <div class="mc-subtitle">Développeur Full Stack · Paris</div>

      <div class="mc-instructions desktop-only">
        <div class="instr-title">CONTRÔLES</div>
        <div class="instr-row"><kbd>← / Q / A</kbd><span>Aller à gauche</span></div>
        <div class="instr-row"><kbd>→ / D</kbd><span>Aller à droite</span></div>
        <div class="instr-row"><kbd>↑ / W / Z</kbd><span>Entrer dans un bâtiment</span></div>
        <div class="instr-row"><kbd>↓ / S</kbd><span>Fermer une fenêtre</span></div>
      </div>

      <button class="mc-btn" id="btn-start">Let's go !!!</button>
      <a href="assets/CV.pdf" target="_blank" class="cv-link">Vue rapide — CV classique</a>
    </div>
  </div>

  <div id="screen-game" class="screen hidden">
    <canvas id="gameCanvas"></canvas>
  </div>

  <div id="modal-backdrop" class="modal-backdrop hidden"></div>
  <div id="section-modal" class="section-modal hidden">
    <div class="modal-header">
      <div id="modal-title" class="modal-title"></div>
      <button id="modal-close" class="modal-close">FERMER</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
  </div>

  <div class="toast hidden" id="toast"></div>

  <script>
    if(/Mobi|Android/i.test(navigator.userAgent)){
      document.querySelectorAll('.desktop-only').forEach(el => el.style.display='none');
    }
  </script>
  <!-- EmailJS — https://emailjs.com : remplacer YOUR_PUBLIC_KEY ci-dessous -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>emailjs.init('a8mKuHS56bPD-ydT0');</script>

  <script src="js/museum.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/mobileControls.js"></script>
  <script src="js/interactions.js"></script>
  <script src="js/player.js"></script>
  <script src="js/map.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
